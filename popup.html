<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #1a0533 0%, #0d1b3e 100%);
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 70%, rgba(255, 0, 80, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 30%, rgba(0, 242, 234, 0.12) 0%, transparent 50%);
      animation: bg-shift 8s ease-in-out infinite;
    }

    @keyframes bg-shift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(5%, -3%); }
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      position: relative;
      z-index: 1;
      background: linear-gradient(90deg, #ff0050, #00f2ea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
      position: relative;
      z-index: 1;
    }

    /* ── Content ───────────────────────────────── */
    .content {
      padding: 16px;
    }

    .feature {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: background 0.2s;
    }

    .feature:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .feature-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-icon.bg {
      background: linear-gradient(135deg, rgba(255, 0, 80, 0.2), rgba(255, 0, 80, 0.05));
    }

    .feature-icon.pip {
      background: linear-gradient(135deg, rgba(0, 242, 234, 0.2), rgba(0, 242, 234, 0.05));
    }

    .feature-icon.key {
      background: linear-gradient(135deg, rgba(156, 39, 176, 0.2), rgba(156, 39, 176, 0.05));
    }

    .feature-icon svg {
      width: 18px;
      height: 18px;
    }

    .feature-text h3 {
      font-size: 13px;
      font-weight: 600;
      color: #f0f0f0;
      margin-bottom: 2px;
    }

    .feature-text p {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      line-height: 1.4;
    }

    /* ── Status ────────────────────────────────── */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(0, 242, 234, 0.06);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00f2ea;
      box-shadow: 0 0 8px rgba(0, 242, 234, 0.5);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status span {
      font-size: 11px;
      color: rgba(0, 242, 234, 0.8);
    }

    /* ── Kbd tag ───────────────────────────────── */
    kbd {
      display: inline-block;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: inherit;
      color: #ccc;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>TikTok Background Play</h1>
    <p>Фоновый режим + плавающее окно</p>
  </div>

  <div class="content">
    <div class="feature">
      <div class="feature-icon bg">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ff0050" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
          <line x1="1" y1="1" x2="23" y2="23" stroke="#ff0050" stroke-width="2"/>
        </svg>
      </div>
      <div class="feature-text">
        <h3>Фоновое воспроизведение</h3>
        <p>Видео продолжает играть при переключении вкладки</p>
      </div>
    </div>

    <div class="feature">
      <div class="feature-icon pip">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00f2ea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
          <rect x="12" y="10" width="8" height="6" rx="1" ry="1" fill="#00f2ea" opacity="0.3"/>
          <polyline points="9 17 9 21 15 21 15 17"/>
        </svg>
      </div>
      <div class="feature-text">
        <h3>Picture-in-Picture</h3>
        <p>Нажмите кнопку в правом нижнем углу TikTok для плавающего окна</p>
      </div>
    </div>

    <div class="feature">
      <div class="feature-icon key">
        <svg viewBox="0 0 24 24" fill="none" stroke="#9c27b0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="10" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="feature-text">
        <h3>Горячая клавиша</h3>
        <p><kbd>Alt</kbd> + <kbd>P</kbd> — быстрое включение PiP</p>
      </div>
    </div>
  </div>

  <div class="status">
    <div class="status-dot"></div>
    <span>Активно на TikTok.com</span>
  </div>

</body>
</html>
